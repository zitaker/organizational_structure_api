version: "3.10"

services:
  postgres:
    container_name: organizational_structure_postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    container_name: organizational_structure_api
    build:
      context: .
      args:
        DEV_ENV: "true"
      dockerfile: Dockerfile
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./pyproject.toml:/app/pyproject.toml
      - ./.env:/app/.env
      - ./logging.log:/app/logging.log
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=src.conf.settings
      - DEFAULT_DB=${DEFAULT_DB}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py runserver 0.0.0.0:8000
      "

  test:
    container_name: organizational_structure_tests
    build:
      context: .
      args:
        DEV_ENV: "true"
      dockerfile: Dockerfile
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./pyproject.toml:/app/pyproject.toml
      - ./.env:/app/.env
      - ./logging.log:/app/logging.log
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=src.conf.settings
      - DEFAULT_DB=${DEFAULT_DB}
      - DEBUG=True
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        sleep 5 &&
        pytest
      "

volumes:
  postgres_data: